services:
  - type: web
    name: amigopet-v8-backend
    env: docker
    rootDir: backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEFAULT_ADDRESS
        value: Rua Mirabel, 49 Piabetá - Magé - RJ CEP 25931-854
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_PUBLIC_KEY
        sync: false
